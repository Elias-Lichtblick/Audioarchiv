name: Update audio index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install YouTube metadata tool
        run: python -m pip install --upgrade yt-dlp

      - name: Crawl K23 audio index
        run: python crawl_k23.py

      - name: Enrich index with The Nokturnal Times metadata
        run: |
          python crawl_youtube.py \
            --channel "https://www.youtube.com/channel/UCgj0uCW9VR8p3PUJ91oDz9g/videos" \
            --audio-index audio-index.json \
            --out audio-index.json \
            --youtube-out youtube-index.json

      - name: Commit updated indexes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add audio-index.json youtube-index.json
          git commit -m "Update audio and YouTube index" || echo "No changes"
          git push

name: Update audio index

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:
  update-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install YouTube metadata dependency
        run: python -m pip install --upgrade yt-dlp

      - name: Crawl K23 audio archive
        run: python crawl_k23.py

      - name: Enrich with The Nokturnal Times metadata
        run: python crawl_youtube.py
        env:
          YOUTUBE_CHANNEL_URL: "https://www.youtube.com/channel/UCgj0uCW9VR8p3PUJ91oDz9g/videos"
          MAX_YOUTUBE_VIDEOS: "500"
          YOUTUBE_MATCH_THRESHOLD: "0.74"

      - name: Commit updated index files
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add audio-index.json youtube-index.json crawler-report.json
          git commit -m "Update audio index" || echo "No changes"
          git push
